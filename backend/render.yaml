services:
  - type: web
    name: hospital-erp-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-erp-db
          property: connectionString

databases:
  - name: hospital-erp-db
    databaseName: hospital_erp
    plan: free
